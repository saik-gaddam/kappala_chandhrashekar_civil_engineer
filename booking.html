<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | KCS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <div class="bg">
        <nav>
            <a href="index.html" class="logo">KCS</a>
            <div class="nav-links">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="booking.html" class="active">Book Appointment</a></li>
                </ul>
            </div>
        </nav>

        <main class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-7" data-aos="fade-up">
                    <div class="booking-card">
                        <h2 class="text-center mb-4">Book a Consultation</h2>
                        
                        <form action="https://api.web3forms.com/submit" method="POST" id="form">
                            <!-- Security: Replace with your actual Access Key -->
                            <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
                            
                            <!-- Security: Honeypot (Anti-Spam) -->
                            <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

                            <div class="mb-3">
                                <label class="form-label">Client Name</label>
                                <input type="text" name="name" class="form-control" required placeholder="Enter full name">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Contact Number</label>
                                    <input type="tel" name="phone" class="form-control" required placeholder="+91...">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Service Required</label>
                                    <select name="service" class="form-select">
                                        <option>Structural Design</option>
                                        <option>Land Survey</option>
                                        <option>Site Management</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Consultation Date</label>
                                <input type="date" name="date" class="form-control" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Project Description</label>
                                <textarea name="message" class="form-control" rows="3" placeholder="Describe your project..."></textarea>
                            </div>

                            <button type="submit" class="booking-btn">Submit Request</button>
                            <div id="result" class="mt-3 text-center"></div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        const form = document.getElementById('form');
        const result = document.getElementById('result');

        form.addEventListener('submit', function(e) {
          e.preventDefault();
          const formData = new FormData(form);
          const object = Object.fromEntries(formData);
          const json = JSON.stringify(object);
          result.innerHTML = "Please wait...";

            fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: json
                })
                .then(async (response) => {
                    let json = await response.json();
                    if (response.status == 200) {
                        result.innerHTML = "Booking sent successfully! I will contact you shortly.";
                        form.reset();
                    } else {
                        result.innerHTML = json.message;
                    }
                })
                .catch(error => {
                    result.innerHTML = "Something went wrong!";
                });
        });
    </script>
</body>
</html>
