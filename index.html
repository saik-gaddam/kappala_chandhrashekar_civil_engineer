<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civil Engineer Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <header>
        <h1>Professional Civil Engineering</h1>
        <p>Expertise in Infrastructure & Design</p>
    </header>

    <section id="about">
        <h2>About Me</h2>
        <p>Experienced Civil Engineer specializing in sustainable construction and structural integrity.</p>
    </section>

    <section id="gallery">
        <h2>Project Gallery</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="project1.jpg" alt="Site Work"></div>
            <div class="gallery-item"><img src="project2.jpg" alt="Structural Design"></div>
            <div class="gallery-item"><img src="project3.jpg" alt="Foundation"></div>
        </div>
    </section>

    <section id="contact">
        <h2>Book an Appointment</h2>
        <form id="appointmentForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="details" placeholder="Project Details" required></textarea>
            <button type="submit">Submit Request</button>
        </form>
    </section>

    <footer>
        <div class="social-links">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-whatsapp"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
        </div>
        <p>&copy; 2026 Civil Engineering Portfolio</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
